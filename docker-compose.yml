version: '3.8' # Nên có dòng này để khai báo phiên bản cú pháp

services:
  app-java:
    build: .
    image: myweb:latest # Tên image sẽ được tạo ra
    ports:
      - "8080:8080"
    depends_on:
      - db-mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-mysql:3306/demo_docker_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  db-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo_docker_db
    ports:
      - "3306:3306" # Mở port này để bạn có thể dùng DBeaver/Navicat/MySQL Workbench truy cập vào DB từ máy thật
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: # Khai báo volume ở cấp độ ngoài cùng