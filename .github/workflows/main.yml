name: CI/CD Build and Deploy

on:
  push:
    branches: [ "main" ] # Chạy khi push code lên main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # Đây là cái dckr_pat... bạn vừa tạo

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: phongphan233/myweb:latest # Build xong đẩy lên đây

  deploy-to-ithutech:
    needs: build-and-push # Đợi build xong mới deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook
        run: |
          curl -X POST "${{ secrets.DEPLOY_URL }}"
